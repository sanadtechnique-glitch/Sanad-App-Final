kind = "web"
previewPath = "/"
title = "المدينة الرقمية - Digital City"
version = "1.0.0"
id = "artifacts/digital-city"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19377

[services.development]
run = "pnpm --filter @workspace/digital-city run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/digital-city", "run", "build" ]
publicDir = "artifacts/digital-city/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19377"
BASE_PATH = "/"
