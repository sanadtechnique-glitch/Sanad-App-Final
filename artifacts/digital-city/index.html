<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>سند - Sanad</title>
    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.json" />

    <!-- PWA / Add to Home Screen -->
    <meta name="theme-color" content="#1A4D1F" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS / Safari (Apple Touch Icon — 180×180, cream bg, splash-identical logo) -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="سند" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800;900&family=Tajawal:wght@400;500;700;800;900&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Inline splash: shows instantly before any JS loads — eliminates white screen -->
    <div id="inline-splash" style="
      position:fixed;inset:0;z-index:99999;
      background:#FFF3E0;
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      transition:opacity 0.4s ease;
    ">
      <img src="/sanad-logo-master.png" alt="سند"
           style="width:180px;height:auto;margin-bottom:24px;"
           onerror="this.style.display='none'" />
      <div style="
        width:48px;height:4px;border-radius:2px;
        background:#FFA500;opacity:0.7;
        animation:sanad-pulse 1.2s ease-in-out infinite alternate;
      "></div>
      <style>
        @keyframes sanad-pulse { from{opacity:0.3;transform:scaleX(0.7)} to{opacity:1;transform:scaleX(1)} }
      </style>
    </div>
    <script>
      /* Remove inline splash once React has mounted */
      window.__removeSplash = function() {
        var el = document.getElementById('inline-splash');
        if (el) { el.style.opacity='0'; setTimeout(function(){ el.remove(); }, 420); }
      };
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
