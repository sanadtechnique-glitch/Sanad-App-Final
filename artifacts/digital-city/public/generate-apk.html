<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>توليد APK – سند · Sanad</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#FFF3E0;min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      padding:24px;color:#1A4D1F}
    .card{background:#fff;border-radius:20px;padding:36px 28px;max-width:500px;
      width:100%;box-shadow:0 4px 32px rgba(26,77,31,.10);text-align:center}
    img{width:80px;margin-bottom:14px}
    h1{font-size:1.5rem;margin-bottom:4px}
    .sub{color:#888;font-size:.88rem;margin-bottom:24px}
    label{display:block;text-align:right;font-size:.85rem;color:#555;margin-bottom:6px;font-weight:600}
    input[type=url]{width:100%;padding:11px 14px;border:2px solid #ddd;border-radius:10px;
      font-size:.95rem;direction:ltr;text-align:left;outline:none;
      transition:border .2s}
    input[type=url]:focus{border-color:#FFA500}
    .url-hint{font-size:.75rem;color:#aaa;margin-top:5px;text-align:right;margin-bottom:18px}
    .status-box{background:#F5F5F5;border-radius:12px;padding:16px 18px;margin:18px 0;
      font-size:.9rem;min-height:56px;display:flex;align-items:center;
      justify-content:center;gap:10px;white-space:pre-wrap;text-align:right}
    .spinner{width:20px;height:20px;border:3px solid #FFA500;border-top-color:transparent;
      border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn{display:inline-block;padding:13px 28px;border:none;border-radius:12px;
      font-size:.95rem;font-weight:700;cursor:pointer;text-decoration:none;
      transition:background .2s;width:100%;margin-top:4px}
    .btn-primary{background:#1A4D1F;color:#fff}
    .btn-primary:hover{background:#133A17}
    .btn-orange{background:#FFA500;color:#fff;font-size:1rem}
    .btn-orange:hover{background:#e59400}
    .btn-outline{background:transparent;border:2px solid #1A4D1F;color:#1A4D1F}
    .btn-outline:hover{background:#f0f8f0}
    .error{color:#c0392b}
    .done{color:#1A4D1F;font-weight:700}
    .note{font-size:.78rem;color:#aaa;margin-top:14px;line-height:1.5}
    hr{border:none;border-top:1px solid #eee;margin:20px 0}
    .tip{background:#fffde7;border-left:4px solid #FFA500;padding:10px 14px;
      border-radius:0 8px 8px 0;text-align:right;font-size:.82rem;color:#555;margin-bottom:18px}
  </style>
</head>
<body>
<div class="card">
  <img src="/sanad-logo-master.png" alt="Sanad Logo"
       onerror="this.style.display='none'" />
  <h1>توليد ملف APK</h1>
  <p class="sub">Sanad - سند &nbsp;|&nbsp; com.sanad.app</p>

  <div class="tip">
    ⚠️ أدخل الرابط الكامل لموقعك المنشور (بعد الضغط على Publish في Replit).
    مثال: <code>https://sanad.replit.app</code>
  </div>

  <label for="prod-url">رابط التطبيق المنشور</label>
  <input type="url" id="prod-url" placeholder="https://your-app.replit.app"
         autocomplete="off" spellcheck="false" dir="ltr" />
  <p class="url-hint" id="detected-url"></p>

  <div class="status-box" id="status-box">
    <span id="status-text">أدخل الرابط وابدأ البناء</span>
  </div>

  <div id="actions">
    <button class="btn btn-primary" onclick="startBuild()">▶ ابدأ بناء APK</button>
  </div>

  <p class="note" id="note"></p>

  <div id="result-area" style="display:none">
    <hr />
    <p style="font-size:.82rem;color:#555;margin-bottom:10px">
      بعد التنزيل: افتح الإعدادات ← الأمان ← السماح بالمصادر المجهولة، ثم افتح الملف.
    </p>
  </div>
</div>

<script>
  /* Auto-detect current origin as a suggestion */
  var input = document.getElementById('prod-url');
  var detectedEl = document.getElementById('detected-url');
  var currentOrigin = window.location.origin;
  if (currentOrigin && !currentOrigin.includes('localhost')) {
    input.value = currentOrigin;
    detectedEl.textContent = '✅ تم اكتشاف الرابط تلقائياً: ' + currentOrigin;
  }

  var polling = false;

  async function startBuild() {
    var url = document.getElementById('prod-url').value.trim();
    if (!url) { alert('الرجاء إدخال رابط التطبيق أولاً'); return; }
    if (!url.startsWith('http')) { alert('يجب أن يبدأ الرابط بـ https://'); return; }
    url = url.replace(/\/+$/, '');

    document.getElementById('actions').innerHTML = '';
    setStatus('⏳', 'جارٍ إرسال الطلب…');

    try {
      var res = await fetch('/api/generate-apk', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: url })
      });
      var data = await res.json();
      if (res.status === 409) {
        setStatus('⏳', 'بناء جارٍ بالفعل…');
      } else if (!res.ok) {
        setStatus('❌', data.error || 'خطأ غير معروف', true);
        showRetry(); return;
      }
      document.getElementById('note').textContent =
        '⏱ العملية تستغرق 2-5 دقائق. الصفحة تتحدث تلقائياً كل 4 ثوانٍ.';
      pollStatus();
    } catch(e) {
      setStatus('❌', 'فشل الاتصال: ' + e.message, true);
      showRetry();
    }
  }

  async function pollStatus() {
    if (polling) return;
    polling = true;
    var iv = setInterval(async () => {
      try {
        var res = await fetch('/api/generate-apk/status');
        var data = await res.json();
        if (data.state === 'building') {
          setStatus('⏳', data.message);
        } else if (data.state === 'done') {
          clearInterval(iv); polling = false;
          setStatus('✅', data.message, false, true);
          document.getElementById('actions').innerHTML =
            '<a class="btn btn-orange" href="' + data.apkUrl + '" download>⬇ تنزيل Sanad.apk</a>';
          document.getElementById('note').textContent = '';
          document.getElementById('result-area').style.display = '';
        } else if (data.state === 'error') {
          clearInterval(iv); polling = false;
          setStatus('❌', data.message, true);
          showRetry();
        }
      } catch(_) { /* keep polling */ }
    }, 4000);
  }

  function setStatus(icon, msg, isErr, isDone) {
    var box = document.getElementById('status-box');
    var cls = isErr ? 'error' : isDone ? 'done' : '';
    box.innerHTML = icon === '⏳'
      ? '<div class="spinner"></div><span>' + msg + '</span>'
      : '<span class="' + cls + '">' + icon + ' ' + msg + '</span>';
  }

  function showRetry() {
    document.getElementById('actions').innerHTML =
      '<button class="btn btn-outline" onclick="location.reload()">↺ إعادة المحاولة</button>';
  }

  /* Auto-check on page load */
  (async () => {
    try {
      var res = await fetch('/api/generate-apk/status');
      var data = await res.json();
      if (data.state === 'building') {
        document.getElementById('actions').innerHTML = '';
        setStatus('⏳', data.message);
        document.getElementById('note').textContent = 'بناء جارٍ. الصفحة تتحدث تلقائياً.';
        pollStatus();
      } else if (data.state === 'done') {
        setStatus('✅', data.message, false, true);
        document.getElementById('actions').innerHTML =
          '<a class="btn btn-orange" href="' + data.apkUrl + '" download>⬇ تنزيل Sanad.apk</a>';
        document.getElementById('result-area').style.display = '';
      }
    } catch(_) {}
  })();
</script>
</body>
</html>
