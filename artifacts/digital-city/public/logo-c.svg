<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="400" height="300">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&amp;family=Outfit:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Concept C: TRAIT RAPIDE / خط سرعة — modern & clean -->

  <!-- Orange speed swoosh bar — behind text -->
  <rect x="30" y="162" width="340" height="14" rx="7" fill="#FFA500" opacity="0.25"/>
  <!-- Solid left segment (accent) -->
  <rect x="30" y="162" width="120" height="14" rx="7" fill="#FFA500"/>

  <!-- Arabic: سند -->
  <text x="200" y="185"
    text-anchor="middle"
    font-family="'Reem Kufi','Noto Kufi Arabic','Cairo',sans-serif"
    font-size="118" font-weight="700"
    fill="#006B3C" direction="rtl">سند</text>

  <!-- Small orange pin dot — floating top right of ن -->
  <circle cx="280" cy="68" r="11" fill="#FFA500"/>
  <circle cx="280" cy="68" r="5" fill="#006B3C"/>

  <!-- Latin: Sanad — tight spacing, right-aligned for RTL feel -->
  <text x="200" y="256"
    text-anchor="middle"
    font-family="'Outfit','Montserrat','Arial',sans-serif"
    font-size="44" font-weight="700"
    fill="#006B3C" letter-spacing="8">Sanad</text>
</svg>
