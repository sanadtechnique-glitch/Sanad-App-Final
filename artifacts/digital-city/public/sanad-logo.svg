<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&amp;family=Outfit:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Map Pin — tip points near the noon dot of سند -->
  <!-- Pin centered at x=258 (slightly right of center where ن falls), tip at y=178 -->
  <path
    d="M258 88
       C237 88 219 106 219 127
       C219 155 258 178 258 178
       C258 178 297 155 297 127
       C297 106 279 88 258 88 Z"
    fill="#006B3C"
  />
  <circle cx="258" cy="127" r="16" fill="#FFA500"/>

  <!-- Arabic: سند — Reem Kufi (Kufic style) -->
  <text
    x="250"
    y="292"
    text-anchor="middle"
    font-family="'Reem Kufi','Noto Kufi Arabic','Cairo',sans-serif"
    font-size="108"
    font-weight="700"
    fill="#006B3C"
    direction="rtl"
  >سند</text>

  <!-- Latin: Sanad -->
  <text
    x="250"
    y="365"
    text-anchor="middle"
    font-family="'Outfit','Montserrat','Arial',sans-serif"
    font-size="62"
    font-weight="700"
    fill="#006B3C"
    letter-spacing="3"
  >Sanad</text>
</svg>
