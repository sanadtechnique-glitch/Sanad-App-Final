<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="500" height="380">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&amp;family=Outfit:wght@700&amp;display=swap');
    </style>
  </defs>

  <!--
    Arabic "سند" baseline=292, font-size=108.
    Pin tip at y=232 (right at ن dot).
    Pin center at y=196, radius=27. x=254 ≈ noon letter.
  -->
  <path
    d="M254 169
       C235 169 227 183 227 196
       C227 217 254 232 254 232
       C254 232 281 217 281 196
       C281 183 273 169 254 169 Z"
    fill="#006B3C"
  />
  <circle cx="254" cy="196" r="12" fill="#FFA500"/>

  <!-- Arabic: سند -->
  <text
    x="250"
    y="292"
    text-anchor="middle"
    font-family="'Reem Kufi','Noto Kufi Arabic','Cairo',sans-serif"
    font-size="108"
    font-weight="700"
    fill="#006B3C"
    direction="rtl"
  >سند</text>

  <!-- Latin: Sanad -->
  <text
    x="250"
    y="365"
    text-anchor="middle"
    font-family="'Outfit','Montserrat','Arial',sans-serif"
    font-size="62"
    font-weight="700"
    fill="#006B3C"
    letter-spacing="3"
  >Sanad</text>
</svg>
