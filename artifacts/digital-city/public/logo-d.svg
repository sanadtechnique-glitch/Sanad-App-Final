<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&amp;family=Outfit:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Concept D: HEXAGONE — modern tech feel -->

  <!-- Hexagon (flat-top) -->
  <polygon
    points="200,20 280,62 280,148 200,190 120,148 120,62"
    fill="#006B3C"
    stroke="#FFA500" stroke-width="6"
  />

  <!-- Arabic: سند — white inside hexagon, smaller -->
  <text x="200" y="150"
    text-anchor="middle"
    font-family="'Reem Kufi','Noto Kufi Arabic','Cairo',sans-serif"
    font-size="72" font-weight="700"
    fill="#FFFFFF" direction="rtl">سند</text>

  <!-- Orange accent line below hexagon -->
  <line x1="140" y1="210" x2="260" y2="210" stroke="#FFA500" stroke-width="5" stroke-linecap="round"/>
  <line x1="165" y1="222" x2="235" y2="222" stroke="#FFA500" stroke-width="3" stroke-linecap="round" opacity="0.5"/>

  <!-- Latin: Sanad -->
  <text x="200" y="275"
    text-anchor="middle"
    font-family="'Outfit','Montserrat','Arial',sans-serif"
    font-size="44" font-weight="700"
    fill="#006B3C" letter-spacing="5">Sanad</text>

  <!-- Small orange dot on top vertex of hexagon -->
  <circle cx="200" cy="20" r="9" fill="#FFA500"/>
</svg>
