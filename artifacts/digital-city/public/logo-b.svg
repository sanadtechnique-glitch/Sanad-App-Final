<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&amp;family=Outfit:wght@700&amp;display=swap');
    </style>
    <!-- Circular text path -->
    <path id="arc-top" d="M 80,175 A 120,120 0 0,1 320,175"/>
  </defs>

  <!-- Concept B: BADGE CIRCULAIRE / شارة دائرية -->

  <!-- Outer ring (orange) -->
  <circle cx="200" cy="155" r="128" fill="none" stroke="#FFA500" stroke-width="6"/>
  <!-- Inner ring (green thin) -->
  <circle cx="200" cy="155" r="114" fill="none" stroke="#006B3C" stroke-width="2.5" stroke-dasharray="6 5"/>
  <!-- Green fill circle -->
  <circle cx="200" cy="155" r="106" fill="#006B3C"/>

  <!-- Arabic: سند — white inside circle -->
  <text x="200" y="185"
    text-anchor="middle"
    font-family="'Reem Kufi','Noto Kufi Arabic','Cairo',sans-serif"
    font-size="96" font-weight="700"
    fill="#FFFFFF" direction="rtl">سند</text>

  <!-- Small orange dot at top of circle -->
  <circle cx="200" cy="29" r="9" fill="#FFA500"/>
  <!-- Small dot left & right -->
  <circle cx="74" cy="155" r="6" fill="#FFA500"/>
  <circle cx="326" cy="155" r="6" fill="#FFA500"/>

  <!-- Latin: Sanad — below circle -->
  <text x="200" y="316"
    text-anchor="middle"
    font-family="'Outfit','Montserrat','Arial',sans-serif"
    font-size="40" font-weight="700"
    fill="#006B3C" letter-spacing="5">Sanad</text>
</svg>
