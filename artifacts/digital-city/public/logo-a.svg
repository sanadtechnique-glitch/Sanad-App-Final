<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 340" width="400" height="340">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&amp;family=Outfit:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- Concept A: PORTE / باب  — fits "لباب الدار" -->
  <!-- Door arch body -->
  <rect x="148" y="90" width="104" height="118" rx="52" ry="52" fill="none" stroke="#006B3C" stroke-width="9"/>
  <!-- Door bottom rectangle (cutting the arch at midpoint) -->
  <rect x="148" y="142" width="104" height="66" fill="#FFF3E0"/>
  <rect x="148" y="142" width="104" height="66" fill="none" stroke="#006B3C" stroke-width="9"/>
  <!-- Orange handle dot -->
  <circle cx="225" cy="178" r="8" fill="#FFA500"/>
  <!-- Roof triangle -->
  <polygon points="200,50 130,100 270,100" fill="#FFA500" opacity="0.9"/>
  <!-- Small window at top -->
  <circle cx="200" cy="80" r="10" fill="#FFF3E0"/>

  <!-- Arabic: سند -->
  <text x="200" y="258"
    text-anchor="middle"
    font-family="'Reem Kufi','Noto Kufi Arabic','Cairo',sans-serif"
    font-size="90" font-weight="700"
    fill="#006B3C" direction="rtl">سند</text>

  <!-- Latin: Sanad -->
  <text x="200" y="318"
    text-anchor="middle"
    font-family="'Outfit','Montserrat','Arial',sans-serif"
    font-size="42" font-weight="700"
    fill="#FFA500" letter-spacing="4">Sanad</text>
</svg>
