<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&amp;family=Outfit:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- White square background -->
  <rect width="600" height="600" fill="#FFFFFF"/>

  <!-- Map Pin — tip near ن dot, centered ~x=310 (noon letter position) -->
  <path
    d="M310 192
       C285 192 264 213 264 238
       C264 270 310 300 310 300
       C310 300 356 270 356 238
       C356 213 335 192 310 192 Z"
    fill="#006B3C"
  />
  <circle cx="310" cy="238" r="20" fill="#FFA500"/>

  <!-- Arabic: سند — Kufic font -->
  <text
    x="300"
    y="430"
    text-anchor="middle"
    font-family="'Reem Kufi','Noto Kufi Arabic','Cairo',sans-serif"
    font-size="130"
    font-weight="700"
    fill="#006B3C"
    direction="rtl"
  >سند</text>

  <!-- Latin: Sanad -->
  <text
    x="300"
    y="522"
    text-anchor="middle"
    font-family="'Outfit','Montserrat','Arial',sans-serif"
    font-size="76"
    font-weight="700"
    fill="#006B3C"
    letter-spacing="4"
  >Sanad</text>
</svg>
