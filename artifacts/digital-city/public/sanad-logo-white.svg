<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&amp;family=Outfit:wght@700&amp;display=swap');
    </style>
  </defs>

  <rect width="600" height="600" fill="#FFFFFF"/>

  <!--
    Pin tip at y=355 — sits right on top of the ن dot.
    Pin head center at y=315, radius=32, top at y=283.
    x=305 ≈ position of noon letter in centered "سند".
  -->
  <path
    d="M305 283
       C283 283 273 299 273 315
       C273 338 305 355 305 355
       C305 355 337 338 337 315
       C337 299 327 283 305 283 Z"
    fill="#006B3C"
  />
  <circle cx="305" cy="315" r="14" fill="#FFA500"/>

  <!-- Arabic: سند -->
  <text
    x="300"
    y="430"
    text-anchor="middle"
    font-family="'Reem Kufi','Noto Kufi Arabic','Cairo',sans-serif"
    font-size="130"
    font-weight="700"
    fill="#006B3C"
    direction="rtl"
  >سند</text>

  <!-- Latin: Sanad -->
  <text
    x="300"
    y="522"
    text-anchor="middle"
    font-family="'Outfit','Montserrat','Arial',sans-serif"
    font-size="76"
    font-weight="700"
    fill="#006B3C"
    letter-spacing="4"
  >Sanad</text>
</svg>
