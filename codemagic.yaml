workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Set Java Version and Install
        script: |
          sdk use java 17.0.10-tem
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          # 1. الدخول المباشر لمجلد الأندرويد الذي اكتشفناه
          cd artifacts/digital-city/android
          
          # 2. إنشاء الملف المفقود في المسار الذي يطلبه الخطأ بالضبط
          # الخطأ يقول إنه يبحث عنه في: capacitor-cordova-android-plugins/cordova.variables.gradle
          mkdir -p capacitor-cordova-android-plugins
          echo "// فارغ لتجاوز الخطأ" > capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 3. التأكد من وجود نسخة في مجلد app أيضاً للاحتياط
          mkdir -p app/capacitor-cordova-android-plugins
          cp capacitor-cordova-android-plugins/cordova.variables.gradle app/capacitor-cordova-android-plugins/
          
          # 4. محاولة البناء الآن
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
