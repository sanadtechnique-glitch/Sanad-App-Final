workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Fix Yarn Path and Install
        script: |
          touch yarn.lock
          yarn install
      - name: Build Android APK
        script: | 
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - android/app/outputs/apk/**/*.apk
