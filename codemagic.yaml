workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Set Java Version and Install
        script: |
          sdk use java 17.0.10-tem
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          # 1. تثبيت كاباسيتور وتحديث الروابط
          npm install -g @capacitor/cli
          
          # 2. تحديث الإضافات لإنشاء الـ Variants المطلوبة
          npx cap update android
          
          # 3. الانتقال للمجلد وتجهيز الملفات المفقودة
          cd artifacts/digital-city/android
          mkdir -p capacitor-cordova-android-plugins
          echo "// empty" > capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 4. بناء التطبيق مع السماح لـ Gradle بحل مشاكل الاعتماديات تلقائياً
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
