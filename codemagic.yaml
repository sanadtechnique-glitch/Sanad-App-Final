workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Force Install Dependencies
        script: |
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          # 1. التأكد من وجود أدوات كاباسيتور
          npm install -g @capacitor/cli
          
          # 2. الانتقال للمجلد الصحيح مباشرة
          cd artifacts/digital-city/android
          
          # 3. معالجة مشكلة Cordova المفقودة يدوياً (للاحتياط)
          mkdir -p capacitor-cordova-android-plugins
          echo "" > capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 4. تشغيل البناء مع إيقاف الـ Daemon وتجاهل المشاكل البسيطة
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace --warning-mode all
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
