workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Preparation
        script: |
          sdk use java 17.0.10-tem
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Rebuild Capacitor & Android APK
        script: | 
          # 1. تثبيت الأدوات اللازمة
          npm install -g @capacitor/cli @capacitor/core @capacitor/android
          
          # 2. تحديث الروابط وبناء الإضافات (هذه الخطوة ستحل مشكلة No variants)
          npx cap sync android
          
          # 3. الانتقال للمجلد العميق
          cd artifacts/digital-city/android
          
          # 4. إصلاح ملف Cordova (بمحتوى برمجي صحيح)
          mkdir -p capacitor-cordova-android-plugins
          echo "apply plugin: 'com.android.library'" > capacitor-cordova-android-plugins/build.gradle
          echo "android { compileSdk 34; namespace 'com.capacitor.plugins' }" >> capacitor-cordova-android-plugins/build.gradle
          echo "ext { }" > capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 5. البناء النهائي
          chmod +x gradlew
          ./gradlew :capacitor-cordova-android-plugins:assembleDebug
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
