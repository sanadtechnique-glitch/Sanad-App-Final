workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Preparation
        script: |
          sdk use java 17.0.10-tem
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          npm install -g @capacitor/cli
          npx cap sync android
          
          cd artifacts/digital-city/android
          
          # 1. إنشاء هيكل كامل لمجلد الإضافات ليعتبره Gradle مشروعاً حقيقياً
          mkdir -p capacitor-cordova-android-plugins/src/main
          echo '<?xml version="1.0" encoding="utf-8"?><manifest package="com.capacitor.plugins"></manifest>' > capacitor-cordova-android-plugins/src/main/AndroidManifest.xml
          
          # 2. إنشاء ملف build.gradle للمكتبة مع تعريف الـ variants
          echo "apply plugin: 'com.android.library'" > capacitor-cordova-android-plugins/build.gradle
          echo "android { compileSdk 34; namespace 'com.capacitor.plugins'; defaultConfig { minSdk 22 } }" >> capacitor-cordova-android-plugins/build.gradle
          echo "ext { }" > capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 3. تعديل نسخة الـ SDK للمشروع الرئيسي (كما طلب الخطأ السابق)
          sed -i '' 's/compileSdk = 34/compileSdk = 35/g' variables.gradle || sed -i 's/compileSdk = 34/compileSdk = 35/g' variables.gradle
          
          # 4. تشغيل البناء
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
