workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Preparation
        script: |
          # 1. تنظيف عميق وشامل
          rm -rf node_modules package-lock.json pnpm-lock.yaml
          npm install -g pnpm
          pnpm install --no-frozen-lockfile
      - name: Build Android APK
        script: | 
          # 2. تثبيت Capacitor محلياً لتجنب خطأ "could not determine executable"
          npm install @capacitor/cli @capacitor/core @capacitor/android
          
          # 3. محاولة المزامنة مع تجاهل الأخطاء إذا كان المجلد موجوداً
          ./node_modules/.bin/cap sync android || npx cap sync android
          
          cd artifacts/digital-city/android
          
          # 4. حل مشكلة الـ Timeout: إجبار Gradle على عدم التحميل من الإنترنت
          # سنستخدم نسخة Gradle المثبتة مسبقاً في ماكينة Codemagic
          sed -i '' 's/gradle-8.14.3-all.zip/gradle-8.7-bin.zip/g' gradle/wrapper/gradle-wrapper.properties || true
          
          # 5. تنظيف الملفات المكررة وهيكل الإضافات
          rm -f app/src/main/res/values/ic_launcher_background.xml
          mkdir -p capacitor-cordova-android-plugins/src/main
          echo '<?xml version="1.0" encoding="utf-8"?><manifest package="com.capacitor.plugins"></manifest>' > capacitor-cordova-android-plugins/src/main/AndroidManifest.xml
          echo "apply plugin: 'com.android.library'" > capacitor-cordova-android-plugins/build.gradle
          echo "android { compileSdk 36; namespace 'com.capacitor.plugins'; defaultConfig { minSdk 22 } }" >> capacitor-cordova-android-plugins/build.gradle
          echo "ext { }" > capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 6. تحديث النسخ
          sed -i '' 's/34/36/g' variables.gradle || sed -i 's/34/36/g' variables.gradle
          
          # 7. البناء النهائي مع إيقاف أي محاولة اتصال خارجي للـ Gradle
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --offline || ./gradlew assembleDebug --no-daemon
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
