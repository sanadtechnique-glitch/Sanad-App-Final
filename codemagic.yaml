workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Force Install Dependencies
        script: |
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          # 1. تثبيت أدوات Capacitor بشكل عالمي لضمان عملها
          npm install -g @capacitor/cli
          
          # 2. المزامنة من المجلد الرئيسي للمشروع
          npx cap sync android
          
          # 3. التوجه للمجلد العميق والتأكد من وجود الملفات
          cd artifacts/digital-city/android
          
          # 4. محاولة إصلاح يدوية للملف المفقود إذا لم ينشأ
          mkdir -p capacitor-cordova-android-plugins
          touch capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 5. تشغيل البناء
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
