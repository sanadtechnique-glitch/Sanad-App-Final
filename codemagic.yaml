workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install dependencies
        script: |
          pnpm install --no-frozen-lockfile
      - name: Build Android APK
        script: | 
          cd android
          ./gradlew assembleDebug
    artifacts:
      - android/app/outputs/apk/**/*.apk
