workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Force Install Dependencies
        script: |
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          npm install -g @capacitor/cli
          npx cap sync android
          
          cd artifacts/digital-city/android
          mkdir -p capacitor-cordova-android-plugins
          touch capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # إعدادات لتسريع ومنع تعليق التحميل
          export GRADLE_OPTS="-Dorg.gradle.daemon=false -Dorg.gradle.networkTimeout=60000"
          
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
