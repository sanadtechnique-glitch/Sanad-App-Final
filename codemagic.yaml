workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Set Java Version and Install
        script: |
          # 1. إجبار النظام على استخدام Java 17 (الأكثر استقراراً لـ Capacitor)
          sdk use java 17.0.10-tem
          
          # 2. تنظيف ملفات الإعدادات المتعارضة
          rm -f .npmrc yarn.lock package-lock.json
          
          # 3. تثبيت pnpm وتثبيت المكتبات مع تجاهل الأوامر الاعتراضية
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          # 1. تثبيت أدوات Capacitor
          npm install -g @capacitor/cli
          
          # 2. مزامنة المشروع (Sync)
          npx cap sync android
          
          # 3. الدخول لمجلد الأندرويد
          cd artifacts/digital-city/android
          
          # 4. بناء الـ APK مع تنظيف الذاكرة المؤقتة (Clean)
          chmod +x gradlew
          ./gradlew clean assembleDebug --no-daemon
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
