workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Force Install Dependencies
        script: |
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          # 1. المزامنة لإنشاء ملفات Cordova و Capacitor المفقودة
          npx cap sync
          
          # 2. التوجه لمجلد الأندرويد الذي اكتشفناه سابقاً
          cd artifacts/digital-city/android
          
          # 3. إعطاء صلاحية التنفيذ وبدء البناء
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
