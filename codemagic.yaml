workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Preparation
        script: |
          sdk use java 17.0.10-tem
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          npm install -g @capacitor/cli
          npx cap sync android
          
          cd artifacts/digital-city/android
          
          # 1. حل مشكلة الملف المفقود
          mkdir -p capacitor-cordova-android-plugins
          echo "ext { }" > capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 2. إجبار المشروع على استخدام SDK 36 ليتوافق مع المكتبات الحديثة
          sed -i '' 's/compileSdk = 34/compileSdk = 36/g' variables.gradle || sed -i 's/compileSdk = 34/compileSdk = 36/g' variables.gradle
          sed -i '' 's/targetSdk = 34/targetSdk = 36/g' variables.gradle || sed -i 's/targetSdk = 34/targetSdk = 36/g' variables.gradle
          
          # 3. تشغيل البناء النهائي
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
