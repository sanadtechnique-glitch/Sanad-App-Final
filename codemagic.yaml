workflows:
  android-workflow:
    name: Sanad Android Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Preparation
        script: |
          # تنظيف البيئة
          rm -f .npmrc yarn.lock package-lock.json
          npm install -g pnpm --force
          pnpm install --no-frozen-lockfile --ignore-scripts
      - name: Build Android APK
        script: | 
          # 1. إجبار النظام على استخدام Java 21 من المسار المباشر في Codemagic
          export JAVA_HOME=$JAVA_HOME_21
          export PATH=$JAVA_HOME/bin:$PATH
          java -version # للتأكد في السجلات أن النسخة أصبحت 21
          
          npm install -g @capacitor/cli
          npx cap sync android
          
          cd artifacts/digital-city/android
          
          # 2. تنظيف الملفات المكررة
          rm -f app/src/main/res/values/ic_launcher_background.xml
          
          # 3. هيكل المكتبة المفقودة (بنسخة متوافقة)
          mkdir -p capacitor-cordova-android-plugins/src/main
          echo '<?xml version="1.0" encoding="utf-8"?><manifest package="com.capacitor.plugins"></manifest>' > capacitor-cordova-android-plugins/src/main/AndroidManifest.xml
          echo "apply plugin: 'com.android.library'" > capacitor-cordova-android-plugins/build.gradle
          echo "android { compileSdk 36; namespace 'com.capacitor.plugins'; defaultConfig { minSdk 22 } }" >> capacitor-cordova-android-plugins/build.gradle
          echo "ext { }" > capacitor-cordova-android-plugins/cordova.variables.gradle
          
          # 4. إجبار نسخة الـ SDK على 36
          sed -i '' 's/34/36/g' variables.gradle || sed -i 's/34/36/g' variables.gradle
          
          # 5. تشغيل البناء مع تمرير مسار الجافا لـ Gradle أيضاً
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -Dorg.gradle.java.home=$JAVA_HOME_21
    artifacts:
      - "**/app/outputs/apk/**/*.apk"
