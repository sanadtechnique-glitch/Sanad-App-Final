name: Build Sanad Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 (must come before Android SDK) ──────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 3. Node.js ──────────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ── 4. pnpm ─────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 5. Android SDK ──────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 35
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0"
          yes | sdkmanager --licenses 2>/dev/null || true

      # ── 6. Build web assets ─────────────────────────────────────────────────
      - name: Build Vite frontend
        working-directory: artifacts/digital-city
        run: pnpm run build
        env:
          NODE_ENV: production

      # ── 7. Capacitor sync ───────────────────────────────────────────────────
      - name: Sync Capacitor (embed web into Android)
        working-directory: artifacts/digital-city
        run: ./node_modules/.bin/cap sync android

      # ── 8. Make gradlew executable ──────────────────────────────────────────
      - name: Make Gradle wrapper executable
        working-directory: artifacts/digital-city/android
        run: chmod +x gradlew

      # ── 9. Build debug APK ──────────────────────────────────────────────────
      - name: Build Sanad debug APK
        working-directory: artifacts/digital-city/android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50
          APK_PATH=$(find . -name "app-debug.apk" | head -1)
          echo "APK found at: $APK_PATH"
          cp "$APK_PATH" ../Sanad_Final.apk
          echo "APK copied successfully"

      # ── 10. Upload APK ──────────────────────────────────────────────────────
      - name: Upload Sanad_Final.apk
        uses: actions/upload-artifact@v4
        with:
          name: Sanad_Final
          path: artifacts/digital-city/Sanad_Final.apk
          retention-days: 30

      - name: Show APK info
        run: |
          ls -lh artifacts/digital-city/Sanad_Final.apk
          echo "Download from: Actions tab → This run → Sanad_Final"
