name: Build Sanad Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 21 (Capacitor 8 requires sourceCompatibility = 21) ─────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      # ── 3. Node.js 22 (required by Capacitor 8 CLI) ────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── 4. pnpm ─────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # ── 5. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 6. Build Vite web assets ────────────────────────────────────────────
      - name: Build Vite frontend
        working-directory: artifacts/digital-city
        run: pnpm run build
        env:
          NODE_ENV: production

      # ── 7. Android SDK 34 (stable, as requested) ────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 34
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
          yes | sdkmanager --licenses 2>/dev/null || true

      # ── 8. Fresh Android project ────────────────────────────────────────────
      - name: Regenerate Android project fresh
        working-directory: artifacts/digital-city
        run: |
          rm -rf android
          ./node_modules/.bin/cap add android 2>&1
          ls android/

      # ── 9. Patch SDK to 34 (Capacitor 8 defaults to 36) ────────────────────
      - name: Patch compileSdk and targetSdk to 34
        working-directory: artifacts/digital-city/android
        run: |
          sed -i 's/compileSdkVersion = [0-9]*/compileSdkVersion = 34/' variables.gradle
          sed -i 's/targetSdkVersion = [0-9]*/targetSdkVersion = 34/' variables.gradle
          sed -i 's/compileSdk = [0-9]*/compileSdk = 34/' variables.gradle
          grep "compileSdk\|targetSdk" variables.gradle

      # ── 10. Use default Capacitor icons (no custom icons for now) ───────────
      - name: Verify default icons exist
        working-directory: artifacts/digital-city/android
        run: |
          echo "Icons in mipmap-xxxhdpi:"
          ls -lh app/src/main/res/mipmap-xxxhdpi/
          echo "Icons in mipmap-hdpi:"
          ls -lh app/src/main/res/mipmap-hdpi/

      # ── 11. Make gradlew executable ─────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: artifacts/digital-city/android
        run: chmod +x gradlew

      # ── 12. Build debug APK ─────────────────────────────────────────────────
      - name: Build Sanad debug APK
        working-directory: artifacts/digital-city/android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          APK=$(find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found"
            exit 1
          fi
          cp "$APK" ../Sanad_Final.apk
          ls -lh ../Sanad_Final.apk

      # ── 13. Upload APK ──────────────────────────────────────────────────────
      - name: Upload Sanad_Final.apk
        uses: actions/upload-artifact@v4
        with:
          name: Sanad_Final
          path: artifacts/digital-city/Sanad_Final.apk
          retention-days: 30
