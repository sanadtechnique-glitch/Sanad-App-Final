name: Build Sanad Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout code
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      # ── 3. Node.js 22 (required by Capacitor 8) ────────────────────────────
      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # ── 4. pnpm ─────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      # ── 5. Install dependencies ─────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      # ── 6. Build Vite web assets ────────────────────────────────────────────
      - name: Build Vite frontend
        working-directory: artifacts/digital-city
        run: pnpm run build
        env:
          NODE_ENV: production

      # ── 7. Android SDK — install SDK 36 (required by Capacitor 8 + AGP 8.13)
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: |
          sdkmanager --update 2>/dev/null || true
          sdkmanager "platforms;android-36" "build-tools;36.0.0"
          yes | sdkmanager --licenses 2>/dev/null || true
          echo "Installed SDK components:"
          sdkmanager --list_installed 2>/dev/null | grep "platforms\|build-tools" | head -10

      # ── 8. Fresh Android project (Capacitor 8, AGP 8.13, Gradle 8.14) ──────
      - name: Regenerate Android project fresh
        working-directory: artifacts/digital-city
        run: |
          rm -rf android
          ./node_modules/.bin/cap add android 2>&1
          echo "=== variables.gradle ==="
          cat android/variables.gradle
          echo "=== AGP version ==="
          grep "com.android.tools.build" android/build.gradle

      # ── 9. Copy Yellow Logo icons to all mipmap folders ────────────────────
      - name: Copy Yellow Logo to mipmap folders
        working-directory: artifacts/digital-city
        run: |
          RES="android/app/src/main/res"
          ICONS="public/android-icons"
          for density in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            cp "$ICONS/$density/ic_launcher.png"            "$RES/mipmap-$density/ic_launcher.png"
            cp "$ICONS/$density/ic_launcher_round.png"      "$RES/mipmap-$density/ic_launcher_round.png"
            cp "$ICONS/$density/ic_launcher_foreground.png" "$RES/mipmap-$density/ic_launcher_foreground.png"
          done
          echo "Icons installed:"
          ls -lh android/app/src/main/res/mipmap-xxxhdpi/

      # ── 10. Make gradlew executable ─────────────────────────────────────────
      - name: Make Gradle wrapper executable
        working-directory: artifacts/digital-city/android
        run: chmod +x gradlew

      # ── 11. Build debug APK (full output for debugging) ─────────────────────
      - name: Build Sanad debug APK
        working-directory: artifacts/digital-city/android
        run: |
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1
          APK=$(find app/build/outputs/apk/debug -name "*.apk" 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "ERROR: APK not found"
            find . -name "*.apk" 2>/dev/null
            exit 1
          fi
          cp "$APK" ../Sanad_Final.apk
          ls -lh ../Sanad_Final.apk

      # ── 12. Upload APK ──────────────────────────────────────────────────────
      - name: Upload Sanad_Final.apk
        uses: actions/upload-artifact@v4
        with:
          name: Sanad_Final
          path: artifacts/digital-city/Sanad_Final.apk
          retention-days: 30
