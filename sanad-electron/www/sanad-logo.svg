<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="500" height="420">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Reem+Kufi:wght@700&amp;family=Outfit:wght@700&amp;display=swap');
    </style>
  </defs>

  <!-- ══════════════════════════════════════════
       HEXAGONE (D) — flat-top, centred at 250,105
       r=78 → vertices every 60°
       top:    (250, 27)
       TR:     (318, 66)
       BR:     (318,144)
       bottom: (250,183)
       BL:     (182,144)
       TL:     (182, 66)
  ══════════════════════════════════════════ -->
  <!-- Shadow / depth layer -->
  <polygon
    points="250,30 318,69 318,147 250,186 182,147 182,69"
    fill="#004d2c"
    transform="translate(4,5)"
    opacity="0.18"
  />
  <!-- Main hexagon -->
  <polygon
    points="250,30 318,69 318,147 250,186 182,147 182,69"
    fill="#006B3C"
    stroke="#FFA500" stroke-width="5.5"
  />
  <!-- Inner lighter ring (B: badge detail) -->
  <polygon
    points="250,44 306,75 306,141 250,172 194,141 194,75"
    fill="none"
    stroke="rgba(255,255,255,0.18)" stroke-width="2"
  />

  <!-- ══════════════════════════════════════════
       DOOR ICON (A) — inside hexagon, white
       Arch: cx=250, cy=108
  ══════════════════════════════════════════ -->
  <!-- Arch door body -->
  <path
    d="M228,155 L228,108 A22,28 0 0,1 272,108 L272,155 Z"
    fill="rgba(255,255,255,0.15)"
    stroke="white" stroke-width="4.5" stroke-linejoin="round"
  />
  <!-- Arch top curve explicitly -->
  <path
    d="M228,108 A22,28 0 0,1 272,108"
    fill="none" stroke="white" stroke-width="4.5"
  />
  <!-- Location pin replacing roof triangle — same color, same area -->
  <path
    d="M 250,47 A 17,17 0 0 1 267,64 Q 263,81 250,94 Q 237,81 233,64 A 17,17 0 0 1 250,47 Z"
    fill="#FFA500"
    opacity="0.95"
  />
  <!-- Inner dot (hole) of the pin -->
  <circle cx="250" cy="63" r="6" fill="#006B3C" opacity="0.80"/>
  <!-- Door handle dot (orange, B element) -->
  <circle cx="264" cy="133" r="5.5" fill="#FFA500"/>
  <!-- Orange apex dot (B element) -->
  <circle cx="250" cy="30" r="7" fill="#FFA500"/>
  <!-- Side dots (B element) -->
  <circle cx="182" cy="108" r="5" fill="#FFA500" opacity="0.7"/>
  <circle cx="318" cy="108" r="5" fill="#FFA500" opacity="0.7"/>

  <!-- ══════════════════════════════════════════
       ARABIC TEXT — سند
  ══════════════════════════════════════════ -->
  <text
    x="250" y="295"
    text-anchor="middle"
    font-family="'Reem Kufi','Noto Kufi Arabic','Cairo',sans-serif"
    font-size="108" font-weight="700"
    fill="#006B3C"
    direction="rtl"
  >سند</text>

  <!-- ══════════════════════════════════════════
       YELLOW UNDERLINE — directly under سند
  ══════════════════════════════════════════ -->
  <!-- Main yellow underline under سند -->
  <rect x="118" y="304" width="264" height="11" rx="5.5" fill="#FFA500"/>
  <!-- Subtle glow layer -->
  <rect x="118" y="304" width="264" height="11" rx="5.5" fill="#FFD700" opacity="0.35"/>

  <!-- ══════════════════════════════════════════
       LATIN TEXT — Sanad
  ══════════════════════════════════════════ -->
  <text
    x="250" y="372"
    text-anchor="middle"
    font-family="'Outfit','Montserrat','Arial',sans-serif"
    font-size="52" font-weight="700"
    fill="#006B3C"
    letter-spacing="5"
  >Sanad</text>

</svg>
